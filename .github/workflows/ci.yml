name: Power Engineer CI

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC — URL check
  workflow_dispatch:

jobs:
  lint:
    name: Lint (catalog / install / docs / scanner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: sudo snap install yq || { sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq; }

      - name: Run lint suite
        run: bash tests/run-all.sh

  url-check-targeted:
    name: URL check (PR-touched catalog files)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run targeted URL validation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'power-engineer/references/catalog/**/*.md')
          if [ -n "$CHANGED" ]; then
            echo "Checking URLs in changed catalog files:"
            echo "$CHANGED"
            CATALOG_FILTER="$CHANGED" bash tests/lint/url-validation.sh
          else
            echo "No catalog files changed — skipping targeted URL check"
          fi

  url-check-full:
    name: URL check (full daily sweep)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Run full URL validation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tests/lint/url-validation.sh

  badge-sync:
    name: Badge sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify skill count is in sync
        run: |
          bash scripts/update-skill-count.sh
          git diff --exit-code README.md power-engineer/references/catalog/INDEX.md \
            || { echo "✗ README badge / INDEX total out of sync with catalog"; exit 1; }

  catalog-version-sync:
    name: Catalog version bump check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check .catalog-version bumps when catalog changes
        run: |
          CATALOG_CHANGED=$(git diff --name-only origin/main...HEAD -- 'power-engineer/references/catalog/**/*.md' | wc -l | tr -d ' ')
          VERSION_CHANGED=$(git diff --name-only origin/main...HEAD -- 'power-engineer/.catalog-version' | wc -l | tr -d ' ')

          if [ "$CATALOG_CHANGED" -gt 0 ] && [ "$VERSION_CHANGED" -eq 0 ]; then
            echo "✗ Catalog files changed but .catalog-version was not bumped."
            echo "Files changed:"
            git diff --name-only origin/main...HEAD -- 'power-engineer/references/catalog/**/*.md'
            exit 1
          fi
          echo "✓ catalog-version sync OK"
